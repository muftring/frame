<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px; height: 280px;
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      overflow: hidden; user-select: none;
    }
    /* Corner accent squares */
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      background: #c9a84c;
      opacity: 0.05;
      border-radius: 4px;
    }
    .tl { top: 14px; left: 14px; }
    .br { bottom: 14px; right: 14px; }
    .tr { top: 14px; right: 14px; width: 18px; height: 18px; }
    .bl { bottom: 14px; left: 14px; width: 18px; height: 18px; }
    .mark { width: 72px; height: 72px; margin-bottom: 20px; }
    .wordmark {
      font-size: 26px; font-weight: 200;
      letter-spacing: 10px; color: #f0f0f0;
      margin-bottom: 8px;
      text-indent: 10px; /* compensate for letter-spacing on last char */
    }
    .tagline {
      font-size: 10px; font-weight: 400;
      letter-spacing: 3px; color: #444;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-indent: 3px;
    }
    .version {
      font-size: 10px; color: #333;
      letter-spacing: 1px;
      position: absolute; bottom: 22px;
    }
    .progress-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: #242424;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: #c9a84c; opacity: 0.85;
      border-radius: 0 2px 2px 0;
      transition: width 0.18s ease;
    }
  </style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner br"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>

  <!-- Inline SVG mark (frame-mark-contained content) -->

    </g>

      <rect x="22" y="26" width="11" height="8" rx="1" fill="#1a1a1a" opacity="0.30"/>

      <rect x="4" y="73" width="88" height="16" rx="3" fill="#c9a84c" opacity="0.09"/>

      <rect x="24" y="77" width="11" height="8" rx="1" fill="#1a1a1a" opacity="0.30"/>
      <rect x="39" y="77" width="11" height="8" rx="1" fill="#1a1a1a" opacity="0.30"/>

    <!-- The F: dark gap, gold fill, bright rim -->
    <text x="50" y="72" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="76" font-weight="normal" font-style="italic" fill="#0d0d0d" stroke="#0d0d0d" stroke-width="5" stroke-linejoin="round">F</text>
    <text x="50" y="72" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="76" font-weight="normal" font-style="italic" fill="#c9a84c">F</text>
    <text x="50" y="72" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="76" font-weight="normal" font-style="italic" fill="none" stroke="#ffd966" stroke-width="1.5" stroke-linejoin="round">F</text>
  </svg>

  <div class="wordmark">FRAME</div>
  <div class="tagline">Photo Workflow Studio</div>
  <div class="version" id="version">v1.2.0</div>

  <div class="progress-track">
    <div class="progress-fill" id="progress"></div>
  </div>

  <script>
    // Version is injected by main process after load
    // Progress is updated by main process via executeJavaScript
    function setProgress(pct) {
      document.getElementById('progress').style.width = pct + '%';
    }
    function setVersion(v) {
      document.getElementById('version').textContent = v;
    }
  </script>
</body>
</html>
