<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Sorter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface2: #2e2e2e;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --keep: #2a7a2a;
    --keep-hover: #339933;
    --keep-light: rgba(42,122,42,0.15);
    --delete: #8a2a2a;
    --delete-hover: #b33333;
    --delete-light: rgba(138,42,42,0.15);
    --accent: #c9a84c;
    --accent2: rgba(201,168,76,0.15);
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-right: 4px;
  }
  .topbar-sep { width: 1px; height: 20px; background: var(--border2); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: transparent;
    color: var(--text); font-size: 13px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); border-color: rgba(255,255,255,0.3); }
  .btn:active { opacity: 0.8; }
  .btn svg { flex-shrink: 0; }
  .btn-danger { border-color: rgba(180,60,60,0.5); color: #e88; }
  .btn-danger:hover { background: rgba(138,42,42,0.2); border-color: var(--delete-hover); }
  .btn-accent { border-color: var(--accent); color: var(--accent); }
  .btn-accent:hover { background: var(--accent2); }

  .stats {
    margin-left: auto; display: flex; align-items: center; gap: 14px;
    font-size: 12px; color: var(--text2);
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .stat-dot.keep { background: var(--keep-hover); }
  .stat-dot.trash { background: var(--delete-hover); }
  .stat-dot.total { background: var(--text3); }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── FILMSTRIP ── */
  .filmstrip {
    width: 110px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .thumb-wrap {
    position: relative;
    padding: 4px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .thumb-wrap:hover { background: var(--surface2); }
  .thumb-wrap.active { background: rgba(201,168,76,0.12); }
  .thumb-wrap.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
  }
  .thumb-wrap.trashed { opacity: 0.35; }
  .thumb-wrap.trashed::after {
    content: '🗑';
    position: absolute; top: 6px; right: 6px;
    font-size: 11px; line-height: 1;
  }
  .thumb-img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    border-radius: 4px; display: block;
    background: var(--surface2);
  }
  .thumb-num {
    text-align: center; font-size: 10px;
    color: var(--text3); padding: 2px 0 3px;
  }

  /* ── VIEWER ── */
  .viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: #111;
  }

  .viewer-img-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    min-height: 0;
  }

  .viewer-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity 0.1s;
  }

  .viewer-img.trashed { opacity: 0.35; }

  .trash-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }
  .trash-overlay.show { display: flex; }
  .trash-overlay-icon {
    font-size: 48px; line-height: 1;
  }
  .trash-overlay-text {
    font-size: 14px; font-weight: 600;
    color: #e88;
    background: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* ── ACTION BAR ── */
  .action-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.12s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .action-keep {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 28px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--keep);
    background: var(--keep-light); color: #6d6;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.12s;
  }
  .action-keep:hover { background: var(--keep); color: #fff; }
  .action-keep.active { background: var(--keep); color: #fff; }

  .action-delete {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 28px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--delete);
    background: var(--delete-light); color: #e88;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.12s;
  }
  .action-delete:hover { background: var(--delete); color: #fff; }
  .action-delete.active { background: var(--delete); color: #fff; }

  .progress-wrap {
    position: absolute; bottom: 68px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text2);
    pointer-events: none;
  }
  .progress-bar-bg {
    width: 160px; height: 3px;
    background: var(--border2); border-radius: 2px;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.2s;
  }

  /* ── EMPTY / LOADING STATE ── */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; flex: 1;
    color: var(--text2); text-align: center;
    padding: 32px;
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .empty-sub { font-size: 13px; line-height: 1.6; max-width: 340px; }
  .key-hint {
    display: inline-flex; align-items: center;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 5px; padding: 1px 7px;
    font-size: 12px; font-family: monospace; color: var(--text2);
  }

  /* ── TRASH PANEL ── */
  .trash-panel {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none; z-index: 100;
    align-items: center; justify-content: center;
  }
  .trash-panel.show { display: flex; }
  .trash-modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    width: min(560px, 90vw);
    max-height: 80vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .trash-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  .trash-modal-title { font-size: 15px; font-weight: 600; }
  .trash-modal-body {
    overflow-y: auto; padding: 12px 18px;
    flex: 1; min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .trash-file-list { display: flex; flex-direction: column; gap: 6px; }
  .trash-file-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius);
    background: var(--surface2); font-size: 13px;
    color: var(--text2);
  }
  .trash-file-item svg { flex-shrink: 0; color: var(--delete-hover); }
  .trash-empty-msg {
    text-align: center; color: var(--text3);
    font-size: 13px; padding: 24px 0;
  }
  .trash-modal-footer {
    padding: 12px 18px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 16px; font-size: 13px;
    opacity: 0; transition: all 0.2s;
    pointer-events: none; white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* filename caption */
  .viewer-caption {
    position: absolute; bottom: 72px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: var(--text3);
    pointer-events: none; padding: 0 16px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>Photo Sorter</h1>
  <div class="topbar-sep"></div>
  <button class="btn btn-accent" id="btn-open" onclick="openFolder()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Open folder
  </button>
  <button class="btn btn-danger" id="btn-trash" onclick="showTrash()" style="display:none">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Trash (<span id="trash-count">0</span>)
  </button>
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-dot total"></div><span id="stat-total">0 photos</span></div>
    <div class="stat"><div class="stat-dot keep"></div><span id="stat-keep">0 kept</span></div>
    <div class="stat"><div class="stat-dot trash"></div><span id="stat-trash2">0 trashed</span></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- FILMSTRIP -->
  <div class="filmstrip" id="filmstrip"></div>

  <!-- VIEWER -->
  <div class="viewer" id="viewer">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📷</div>
      <div class="empty-title">Open a folder to start sorting</div>
      <div class="empty-sub">
        Browse through photos one by one.<br>
        Keep what you love, trash the rest.<br><br>
        <b>Keyboard shortcuts:</b><br>
        <span class="key-hint">K</span> Keep &nbsp;
        <span class="key-hint">D</span> Delete &nbsp;
        <span class="key-hint">←</span><span class="key-hint">→</span> Navigate
      </div>
    </div>
    <div class="viewer-img-wrap" id="viewer-wrap" style="display:none">
      <img class="viewer-img" id="viewer-img" alt="Current photo">
      <div class="trash-overlay" id="trash-overlay">
        <div class="trash-overlay-icon">🗑</div>
        <div class="trash-overlay-text">Moved to trash</div>
      </div>
    </div>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <span id="progress-text">1 / 1</span>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>
    <div class="viewer-caption" id="viewer-caption"></div>
  </div>
</div>

<!-- ACTION BAR -->
<div class="action-bar" id="action-bar" style="display:none">
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" title="Previous (←)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="action-keep" id="btn-keep" onclick="markKeep()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Keep
  </button>
  <button class="action-delete" id="btn-del" onclick="markDelete()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    Delete
  </button>
  <button class="nav-btn" id="btn-next" onclick="navigate(1)" title="Next (→)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- TRASH PANEL -->
<div class="trash-panel" id="trash-panel" onclick="e => { if(e.target===this) hideTrash() }">
  <div class="trash-modal">
    <div class="trash-modal-header">
      <div class="trash-modal-title">🗑 Trash</div>
      <button class="btn" onclick="hideTrash()">✕ Close</button>
    </div>
    <div class="trash-modal-body">
      <div class="trash-file-list" id="trash-list"></div>
    </div>
    <div class="trash-modal-footer">
      <button class="btn" onclick="restoreAll()">↩ Restore all</button>
      <button class="btn btn-danger" onclick="emptyTrash()" id="btn-empty-trash">
        🗑 Empty trash &amp; delete files permanently
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let files = [];
let handles = {};
let dirHandle = null;
let current = 0;
let trashed = new Set();
let kept = new Set();
let objectURLs = {};

const IMAGES = ['jpg','jpeg','png','gif','webp','tiff','tif','bmp','heic','heif','nef','cr2','arw','orf','rw2'];

async function openFolder() {
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch(e) { return; }

  files = [];
  handles = {};
  trashed.clear();
  kept.clear();
  revokeAll();

  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind !== 'file') continue;
    const ext = name.split('.').pop().toLowerCase();
    if (!IMAGES.includes(ext)) continue;
    files.push(name);
    handles[name] = handle;
  }

  files.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

  if (files.length === 0) {
    toast('No image files found in that folder.');
    return;
  }

  current = 0;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('viewer-wrap').style.display = 'flex';
  document.getElementById('action-bar').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = 'flex';
  document.getElementById('btn-trash').style.display = '';
  document.getElementById('stats').style.display = '';

  buildFilmstrip();
  await showImage(current);
  updateStats();
}

function revokeAll() {
  Object.values(objectURLs).forEach(u => URL.revokeObjectURL(u));
  objectURLs = {};
}

async function getURL(name) {
  if (objectURLs[name]) return objectURLs[name];
  const handle = handles[name];
  const file = await handle.getFile();
  const url = URL.createObjectURL(file);
  objectURLs[name] = url;
  return url;
}

function buildFilmstrip() {
  const strip = document.getElementById('filmstrip');
  strip.innerHTML = '';
  files.forEach((name, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap' + (trashed.has(name) ? ' trashed' : '');
    wrap.id = `thumb-${i}`;
    wrap.onclick = () => { current = i; showImage(i); };

    const img = document.createElement('img');
    img.className = 'thumb-img';
    img.loading = 'lazy';
    img.alt = name;

    getURL(name).then(url => { img.src = url; });

    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = i + 1;

    wrap.appendChild(img);
    wrap.appendChild(num);
    strip.appendChild(wrap);
  });
}

async function showImage(idx) {
  if (files.length === 0) return;
  current = idx;
  const name = files[idx];
  const url = await getURL(name);

  const img = document.getElementById('viewer-img');
  img.src = url;
  img.className = 'viewer-img' + (trashed.has(name) ? ' trashed' : '');

  const overlay = document.getElementById('trash-overlay');
  overlay.className = 'trash-overlay' + (trashed.has(name) ? ' show' : '');

  const btnKeep = document.getElementById('btn-keep');
  const btnDel = document.getElementById('btn-del');
  btnKeep.className = 'action-keep' + (kept.has(name) && !trashed.has(name) ? ' active' : '');
  btnDel.className = 'action-delete' + (trashed.has(name) ? ' active' : '');

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === files.length - 1;

  document.getElementById('viewer-caption').textContent = name;

  const total = files.length;
  document.getElementById('progress-text').textContent = `${idx + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((idx + 1) / total) * 100}%`;

  document.querySelectorAll('.thumb-wrap').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const strip = document.getElementById('filmstrip');
  const thumb = document.getElementById(`thumb-${idx}`);
  if (thumb) {
    thumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function markKeep() {
  if (files.length === 0) return;
  const name = files[current];
  trashed.delete(name);
  kept.add(name);
  updateThumb(current);
  showImage(current);
  updateStats();
  if (current < files.length - 1) setTimeout(() => navigate(1), 120);
}

function markDelete() {
  if (files.length === 0) return;
  const name = files[current];
  kept.delete(name);
  trashed.add(name);
  updateThumb(current);
  showImage(current);
  updateStats();
  if (current < files.length - 1) setTimeout(() => navigate(1), 120);
}

function updateThumb(idx) {
  const name = files[idx];
  const wrap = document.getElementById(`thumb-${idx}`);
  if (!wrap) return;
  wrap.className = 'thumb-wrap' + (trashed.has(name) ? ' trashed' : '') + (idx === current ? ' active' : '');
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= files.length) return;
  showImage(next);
}

function updateStats() {
  document.getElementById('stat-total').textContent = `${files.length} photos`;
  document.getElementById('stat-keep').textContent = `${kept.size} kept`;
  document.getElementById('stat-trash2').textContent = `${trashed.size} trashed`;
  document.getElementById('trash-count').textContent = trashed.size;
}

function showTrash() {
  const list = document.getElementById('trash-list');
  if (trashed.size === 0) {
    list.innerHTML = '<div class="trash-empty-msg">Trash is empty</div>';
  } else {
    list.innerHTML = [...trashed].map(name => `
      <div class="trash-file-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
        <button class="btn" style="padding:3px 8px;font-size:11px" onclick="restoreFile('${CSS.escape(name)}')">Restore</button>
      </div>`).join('');
  }
  document.getElementById('trash-panel').className = 'trash-panel show';
}

function hideTrash() {
  document.getElementById('trash-panel').className = 'trash-panel';
}

function restoreFile(name) {
  trashed.delete(name);
  const idx = files.indexOf(name);
  if (idx >= 0) updateThumb(idx);
  if (idx === current) showImage(current);
  updateStats();
  showTrash();
}

function restoreAll() {
  [...trashed].forEach(name => {
    trashed.delete(name);
    const idx = files.indexOf(name);
    if (idx >= 0) updateThumb(idx);
  });
  showImage(current);
  updateStats();
  showTrash();
}

async function emptyTrash() {
  if (trashed.size === 0) { toast('Trash is already empty.'); return; }
  const count = trashed.size;
  const confirmed = confirm(
    `Permanently delete ${count} file${count > 1 ? 's' : ''}?\n\nThis cannot be undone. The files will be removed from your disk.\n\nContinue?`
  );
  if (!confirmed) return;

  let deleted = 0, failed = 0;
  for (const name of [...trashed]) {
    try {
      await dirHandle.removeEntry(name);
      if (objectURLs[name]) { URL.revokeObjectURL(objectURLs[name]); delete objectURLs[name]; }
      trashed.delete(name);
      kept.delete(name);
      const idx = files.indexOf(name);
      if (idx >= 0) files.splice(idx, 1);
      deleted++;
    } catch(e) {
      console.error('Could not delete', name, e);
      failed++;
    }
  }

  hideTrash();

  if (files.length === 0) {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('viewer-wrap').style.display = 'none';
    document.getElementById('action-bar').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('empty-state').querySelector('.empty-title').textContent = 'All done!';
    document.getElementById('empty-state').querySelector('.empty-sub').textContent = `Deleted ${deleted} file${deleted !== 1 ? 's' : ''}. Open another folder to continue.`;
  } else {
    current = Math.min(current, files.length - 1);
    buildFilmstrip();
    await showImage(current);
  }
  updateStats();

  const msg = failed > 0
    ? `Deleted ${deleted} file${deleted !== 1 ? 's' : ''}. ${failed} could not be deleted.`
    : `Deleted ${deleted} file${deleted !== 1 ? 's' : ''} permanently.`;
  toast(msg);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'BUTTON') return;
  if (document.getElementById('trash-panel').classList.contains('show')) {
    if (e.key === 'Escape') hideTrash();
    return;
  }
  if (files.length === 0) return;
  switch(e.key) {
    case 'ArrowLeft':  case 'ArrowUp':    e.preventDefault(); navigate(-1); break;
    case 'ArrowRight': case 'ArrowDown':  e.preventDefault(); navigate(1);  break;
    case 'k': case 'K': markKeep();   break;
    case 'd': case 'D': markDelete(); break;
    case 'Escape': hideTrash(); break;
  }
});

document.getElementById('trash-panel').addEventListener('click', function(e) {
  if (e.target === this) hideTrash();
});

if (!window.showDirectoryPicker) {
  document.getElementById('empty-state').querySelector('.empty-sub').innerHTML =
    '<span style="color:#e88">⚠ This app requires Chrome or Edge (desktop).<br>The File System Access API is not supported in this browser.</span>';
}
</script>
</body>
</html>
